<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'IBM Plex Mono', monospace">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#2970ff" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#2970ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#2970ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vign" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </linearGradient>
    <pattern id="hatch" width="9" height="9" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="9" height="9" fill="#262626"/>
      <line x1="0" y1="0" x2="0" y2="9" stroke="#f4f4f4" stroke-opacity="0.16" stroke-width="2"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#161616"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#vign)"/>

  <!-- terminal frame + corner ticks -->
  <rect x="28" y="28" width="1144" height="574" fill="none" stroke="#f4f4f4" stroke-opacity="0.08"/>
  <g stroke="#009d9a" stroke-opacity="0.7" stroke-width="2">
    <path d="M28 46 V28 H46"/>
    <path d="M1172 46 V28 H1154"/>
    <path d="M28 584 V602 H46"/>
    <path d="M1172 584 V602 H1154"/>
  </g>

  <!-- header -->
  <g transform="translate(72,60) scale(0.8125)">
    <rect width="64" height="64" rx="11" fill="#2970ff"/>
    <path d="M43.21 40.24 51 48h-7.65L30.5 35.2h8a6.4 6.4 0 1 0 0-12.8h-2.6L29.43 16h8.72A12.82 12.82 0 0 1 51 28.8c0 5.2-2.3 9.26-7.79 11.44" fill="#fff"/>
    <path d="M20.79 23.76 13 16h7.66l12.85 12.8h-7.95a6.4 6.4 0 1 0 0 12.8h2.59l6.42 6.4h-8.72A12.82 12.82 0 0 1 13 35.2c0-5.2 2.3-9.26 7.79-11.44" fill="#fff"/>
  </g>
  <text x="148" y="103" font-size="27" font-weight="700" letter-spacing="1.5" fill="#f4f4f4">DECRED.SUPPLY</text>
  <rect x="392" y="84" width="15" height="24" fill="#009d9a"/>

  <g text-anchor="end">
    <circle cx="848" cy="92" r="5" fill="#009d9a"/>
    <text x="1128" y="98" font-size="15" font-weight="500" letter-spacing="2" fill="#f4f4f4" fill-opacity="0.55">NETWORK SUPPLY DASHBOARD</text>
  </g>

  <line x1="72" y1="138" x2="1128" y2="138" stroke="#f4f4f4" stroke-opacity="0.08"/>

  <!-- eyebrow -->
  <text x="72" y="222" font-size="17" font-weight="600" letter-spacing="3" fill="#009d9a">// THE SUPPLY SQUEEZE</text>

  <!-- headline -->
  <text x="70" y="312" font-size="66" font-weight="700" letter-spacing="-1" fill="#f4f4f4">How much DCR is</text>
  <text x="70" y="388" font-size="66" font-weight="700" letter-spacing="-1" fill="#f4f4f4">actually <tspan fill="#fa4d56">liquid</tspan>?</text>

  <!-- squeeze bar -->
  <g transform="translate(72,452)">
    <!-- segment category labels -->
    <g font-size="13" font-weight="600" letter-spacing="1.5" fill="#f4f4f4" fill-opacity="0.7">
      <circle cx="6" cy="-6" r="4" fill="#6929c4"/>
      <text x="20" y="-1">STAKED</text>
      <circle cx="540" cy="-6" r="4" fill="#1192e8"/>
      <text x="554" y="-1">TREASURY</text>
      <circle cx="676" cy="-6" r="4" fill="#fa4d56"/>
      <text x="690" y="-1">LIQUID</text>
      <circle cx="908" cy="-6" r="4" fill="#f4f4f4" fill-opacity="0.4"/>
      <text x="922" y="-1">NOT YET MINED</text>
    </g>

    <!-- bar (1056 wide, 34 tall) -->
    <g>
      <rect x="0"    y="14" width="528" height="34" fill="#6929c4"/>
      <rect x="528"  y="14" width="44"  height="34" fill="#1192e8"/>
      <rect x="572"  y="14" width="222" height="34" fill="#0a1530"/>
      <rect x="572"  y="14" width="222" height="34" fill="none" stroke="#fa4d56" stroke-width="2"/>
      <rect x="794"  y="14" width="262" height="34" fill="url(#hatch)"/>
      <rect x="0"    y="14" width="1056" height="34" fill="none" stroke="#f4f4f4" stroke-opacity="0.12"/>
    </g>
    <text x="0" y="78" font-size="14" letter-spacing="0.5" fill="#f4f4f4" fill-opacity="0.45">Most of the supply is locked by code &#8212; tickets, treasury, and unmined coins.</text>
  </g>

  <!-- footer -->
  <line x1="72" y1="556" x2="1128" y2="556" stroke="#f4f4f4" stroke-opacity="0.08"/>
  <text x="72" y="588" font-size="18" font-weight="600" letter-spacing="0.5" fill="#f4f4f4" fill-opacity="0.85">decred.supply</text>
  <text x="1128" y="588" text-anchor="end" font-size="15" font-weight="500" letter-spacing="2" fill="#009d9a">FAIR LAUNCH &#183; NO ICO &#183; NO VCs</text>
</svg>
